interests: 
  Cong Ma is primarily interested in theoretical machine learning and high-dimensional statistics.
  (i) reinforcement learning theory (offline RL, policy evaluation, off-policy evaluation, contextual bandits,
      nonparametric/batched bandits, Markov games; optimism/pessimism; regret and sample-complexity guarantees),
  (ii) transfer learning and distribution shift (covariate shift, domain adaptation, importance weighting; RKHS/nonparametric),
  (iii) low-rank / tensor estimation and recovery (matrix completion/sensing, robust PCA, phase retrieval, blind deconvolution),
  (iv) provable nonconvex optimization dynamics,
  (v) statistical theory for representation learning,
  (vi) ranking and choice/IRT models.
  Prefer theory-heavy papers with explicit assumptions/theorems; deprioritize pure empirical engineering work.

exclude_topics:
  - "bayesian nonparametric"
  - "pure causal inference"
